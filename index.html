<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS | Urban Escape (A2/B1 Conversation)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- FUNDOS CINEMATOGRÁFICOS --- */
        :root {
            --accent: #1DB954;
            --accent-glow: rgba(29, 185, 84, 0.4);
            --correct: #1DB954;
            --incorrect: #E50914;
            --text-main: #FFFFFF;
            --text-dim: #B3B3B3;
            --font-display: 'Cinzel', serif;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(to top, rgba(5,7,12,1) 5%, rgba(5,7,12,0.6) 100%), 
                        url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- ATMOSFERA MÁGICA (ORBS) --- */
        .ambient-orbs {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; overflow: hidden; pointer-events: none;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.25;
            animation: floatOrb 15s infinite alternate ease-in-out;
        }
        .orb-1 { width: 500px; height: 500px; background: #1DB954; top: -10%; left: -10%; }
        .orb-2 { width: 600px; height: 600px; background: #0077ff; bottom: -20%; right: -10%; animation-delay: -5s; }

        @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

        /* --- LAYOUT FULL-SCREEN --- */
        main {
            flex: 1; width: 100%; max-width: 1200px; margin: 0 auto;
            padding-top: 100px; padding-bottom: 150px;
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 10;
        }
        
        .step {
            position: absolute; width: 100%;
            opacity: 0; pointer-events: none; transform: scale(0.95);
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            visibility: hidden;
            max-height: 80vh; overflow-y: auto; padding: 20px;
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
        }
        .step::-webkit-scrollbar { width: 4px; }
        .step::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        
        .step.active {
            opacity: 1; pointer-events: auto; transform: scale(1);
            visibility: visible; position: relative;
        }

        /* --- GLASSMORPHISM PANELS --- */
        .glass-panel {
            background: rgba(15, 18, 25, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            padding: 50px;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        .dual-panel { display: flex; gap: 60px; align-items: center; width: 100%; }
        .dual-panel > * { flex: 1; }
        .divider { width: 2px; height: 200px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2), transparent); }

        @media (max-width: 850px) { .dual-panel { flex-direction: column; gap: 30px; } .divider { display: none; } }

        /* --- TIPOGRAFIA ÉPICA E BOTÕES --- */
        h1, h2, h3 { font-family: var(--font-display); letter-spacing: 2px; text-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 20px;}
        h1 { font-size: 4.5rem; line-height: 1.1; color: #fff; }
        h2 { font-size: 2.5rem; color: var(--accent); display: flex; align-items: center; gap: 15px;}
        p { font-size: 1.2rem; color: var(--text-dim); margin-bottom: 20px; }

        .btn {
            padding: 18px 40px; border: none; border-radius: 500px; font-family: var(--font-body);
            font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 10px;
            background: #fff; color: #000; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-accent { background: var(--accent); color: #000; box-shadow: 0 10px 30px var(--accent-glow); }
        .btn:hover { transform: translateY(-3px) scale(1.02); }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        /* --- UI ELEMENTS (Hub, Grids, Builders) --- */
        .speaking-hub {
            margin-top: 40px; padding: 35px; background: rgba(29, 185, 84, 0.08);
            border-radius: 16px; border: 1px solid var(--accent-glow); position: relative;
        }
        .speaking-hub::before {
            content: '🎙️ SPEAKING HUB'; position: absolute; top: -14px; left: 30px;
            background: var(--accent); color: #000; font-family: var(--font-body); font-size: 0.75rem;
            font-weight: 900; padding: 6px 16px; border-radius: 500px; letter-spacing: 2px;
        }
        .speaking-hub p { color: #fff; font-weight: 600; font-size: 1.3rem; margin-bottom: 15px; }
        
        .speaking-starters-container { display: flex; flex-wrap: wrap; gap: 12px; }
        .speaking-starter {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; padding: 10px 20px; border-radius: 500px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        .speaking-starter:hover, .speaking-starter.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .list-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .list-item {
            padding: 20px 30px; background: rgba(255,255,255,0.03); border-radius: 12px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 1.1rem;
            border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; color: #fff;
        }
        .list-item:hover { background: rgba(255,255,255,0.08); border-color: var(--accent); transform: translateX(10px); }

        .choice-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .choice-card { padding: 30px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.03); border-radius: 16px; transition: all 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .choice-card:hover { background: rgba(255,255,255,0.08); border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3);}
        .choice-card h3 { font-family: var(--font-body); font-size: 1.4rem; margin-bottom: 10px; color: #fff;}
        .choice-card i { font-size: 2.5rem; color: var(--accent); display: block; margin-bottom: 15px;}

        .vocab-word { color: var(--accent); font-weight: 800; cursor: pointer; border-bottom: 2px dashed var(--accent); padding-bottom: 2px; transition: 0.3s;}
        .vocab-word:hover { color: #fff; border-color: #fff; text-shadow: 0 0 10px var(--accent-glow);}

        /* Text Analysis Blocks */
        .text-reading { background: rgba(255,255,255,0.03); padding: 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); font-size: 1.25rem; line-height: 1.8; color: #EBEBEB;}
        .highlight-zone { padding: 30px; background: rgba(255,255,255,0.03); border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); text-align: center; font-size: 1.4rem; line-height: 1.8;}

        /* Error Finder */
        .error-sentence { font-size: 1.8rem; word-spacing: 5px; line-height: 2; font-weight: 600; text-align: center;}
        .error-word { display: inline-block; padding: 5px 10px; cursor: pointer; border-radius: 8px; transition: 0.2s; border: 1px solid transparent;}
        .error-word:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2);}

        /* Sentence Builder */
        .drop-zone { min-height: 120px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 16px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; padding: 20px; gap: 12px; flex-wrap: wrap; background: rgba(0, 0, 0, 0.3); transition: 0.3s;}
        .drop-zone.success { border-color: var(--correct); border-style: solid; background: rgba(29, 185, 84, 0.1); box-shadow: inset 0 0 30px rgba(29,185,84,0.1); }
        .word-bank { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .word-chip { padding: 14px 28px; background: rgba(255,255,255,0.05); border-radius: 500px; cursor: pointer; user-select: none; transition: all 0.3s; font-weight: 700; border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 1.1rem;}
        .word-chip:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        .word-chip.used { opacity: 0; pointer-events: none; transform: scale(0.8); }

        /* Chat Scenario */
        .chat-container { display: flex; flex-direction: column; gap: 20px; margin-top: 20px;}
        .msg { padding: 18px 25px; border-radius: 20px; max-width: 85%; font-size: 1.15rem; line-height: 1.5; text-align: left; position: relative;}
        .msg.friend { background: #282828; align-self: flex-start; border-bottom-left-radius: 4px; color: #fff; border: 1px solid rgba(255,255,255,0.05); }
        .msg.you { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; display: none; font-weight: 700; box-shadow: 0 5px 15px var(--accent-glow);}
        .msg-name { font-size: 0.8rem; font-weight: 800; color: var(--accent); letter-spacing: 1px; display: block; margin-bottom: 5px; text-transform: uppercase;}
        .msg.you .msg-name { color: #121212; }
        .chat-option { padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; color:#fff; font-weight:bold;}
        .chat-option:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }

        /* Memory Minigame */
        .memory-box { display: flex; gap: 15px; justify-content: center; margin: 30px 0; font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: 3px;}
        .memory-btn { width: auto; padding: 15px 25px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.2s;}
        .memory-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); border-color: var(--accent);}

        /* Toggle Rows */
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 20px; margin-bottom: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; font-weight: 600; font-size: 1.1rem; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; color: #fff;}
        .toggle-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 25px; border-radius: 500px; cursor: pointer; font-weight: 700; transition: 0.3s;}
        .toggle-btn:hover { background: rgba(255,255,255,0.1); }
        .toggle-btn.correct { background: var(--correct); color: #000; border-color: var(--correct); }
        .toggle-btn.incorrect { background: var(--incorrect); color: #fff; border-color: var(--incorrect); }

        /* --- HEADERS & FOOTERS --- */
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 80px; padding: 0 40px;
            display: flex; align-items: center; justify-content: space-between; z-index: 100;
            background: linear-gradient(to bottom, rgba(5,7,12,0.9), transparent);
        }
        .logo { font-family: var(--font-display); font-weight: 800; font-size: 1.2rem; color: #fff; letter-spacing: 3px;}
        .logo span { color: var(--accent); }
        .level-badge { background: var(--accent); color: #000; font-family: var(--font-body); padding: 3px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 900; margin-left: 10px; letter-spacing: 1px; }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 100px; padding: 0 50px;
            background: linear-gradient(to top, rgba(5,7,12,1), rgba(5,7,12,0.8)); border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between; z-index: 90; backdrop-filter: blur(20px);
        }

        .controls { display: flex; gap: 15px; }
        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; backdrop-filter: blur(10px); }
        .icon-btn:hover { background: var(--accent); color: #000; transform: scale(1.1); border-color: var(--accent);}

        /* --- ASIDE PANELS --- */
        .vocab-panel {
            position: fixed; top: 0; right: -500px; width: 450px; height: 100vh;
            background: linear-gradient(135deg, rgba(20, 20, 30, 0.6) 0%, rgba(5, 5, 10, 0.9) 100%);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 200;
            padding: 80px 45px; border-left: 1px solid rgba(255,255,255,0.15); 
            box-shadow: -20px 0 60px rgba(0,0,0,0.8);
            transition: right 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column; gap: 25px; overflow-y: auto;
        }
        .vocab-panel.open { right: 0; }
        .vocab-close { position: absolute; top: 30px; right: 30px; color: #fff; background: transparent; border: 1px solid rgba(255,255,255,0.2); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.3s;}
        .vocab-close:hover { background: var(--incorrect); border-color: var(--incorrect); transform: rotate(90deg); }

        .whiteboard-panel { position: fixed; bottom: 100px; right: 30px; width: 450px; height: 500px; background: rgba(10,12,20,0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; z-index: 101; transform: translateY(120%) scale(0.9); display: flex; flex-direction: column; transition: all 0.5s cubic-bezier(0.3, 0, 0, 1); box-shadow: 0 30px 60px rgba(0,0,0,0.9); backdrop-filter: blur(30px); opacity: 0;}
        .whiteboard-panel.open { transform: translateY(0) scale(1); opacity: 1;}
        .wb-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; font-family: var(--font-display); font-size: 1.2rem; color: #fff; letter-spacing: 1px;}
        .wb-content { flex: 1; padding: 25px; outline: none; color: var(--accent); font-family: monospace; font-size: 1.2rem; resize: none; border: none; background: transparent; line-height: 1.8;}

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-10px); } 50% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div class="ambient-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <header class="header">
        <div class="logo"><i class="fa-solid fa-building" style="color:var(--accent); margin-right:8px;"></i> WOLF LABS <span>|</span> URBAN ESCAPE <div class="level-badge">A2/B1</div></div>
        <div class="controls">
            <button class="icon-btn" onclick="toggleWhiteboard()" title="Live Whiteboard"><i class="fa-solid fa-pen-nib"></i></button>
            <button class="icon-btn" onclick="toggleFullscreen()" title="Fullscreen Mode"><i class="fa-solid fa-expand"></i></button>
        </div>
    </header>

    <main id="main-container"></main>

    <nav class="nav-bar">
        <button class="btn" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff;" id="prevBtn" onclick="prevStep()" disabled><i class="fa-solid fa-arrow-left"></i> BACK</button>
        <div style="font-family: var(--font-display); font-weight: 800; font-size: 1.2rem; color: var(--text-dim); letter-spacing: 4px;" id="step-counter">SCENE 1 / 32</div>
        <button class="btn btn-accent" id="nextBtn" onclick="nextStep()">NEXT SCENE <i class="fa-solid fa-arrow-right"></i></button>
    </nav>

    <aside class="vocab-panel" id="vocabPanel">
        <button class="vocab-close" onclick="closeVocab()"><i class="fa-solid fa-xmark"></i></button>
        <div id="asideContent"></div>
    </aside>

    <aside class="whiteboard-panel" id="whiteboardPanel">
        <div class="wb-header"><span><i class="fa-solid fa-chalkboard" style="color:var(--accent); margin-right: 10px;"></i> Teacher's Board</span><button class="vocab-close" style="position:static;" onclick="toggleWhiteboard()"><i class="fa-solid fa-xmark"></i></button></div>
        <textarea class="wb-content" placeholder="Type vocabulary, corrections, or notes here..."></textarea>
    </aside>

    <script>
        // --- 1. VOCAB DATA ---
        const vocabData = {
            'crowded': { def: 'Full of people. Difficult to walk.', ex: 'The subway is always crowded in the morning.', speak: 'Do you like crowded places like concerts or malls?' },
            'peaceful': { def: 'Quiet and calm; without noise or stress.', ex: 'The country is very peaceful at night.', speak: 'Where do you go when you want to feel peaceful?' },
            'polluted': { def: 'Dirty air or water, usually from cars and factories.', ex: 'Big cities are often polluted.', speak: 'Is the air in your city clean or polluted?' },
            'expensive': { def: 'Costing a lot of money.', ex: 'Houses in the city are very expensive.', speak: 'What is the most expensive thing you own?' },
            'stressful': { def: 'Making you feel worried and nervous.', ex: 'Driving in heavy traffic is stressful.', speak: 'What do you do after a stressful day?' },
            'traffic jam': { def: 'When many cars are on the road and they cannot move.', ex: 'I was late for work because of a terrible traffic jam.', speak: 'Is there a lot of traffic jam in your city at 6 PM?' },
            'fresh air': { def: 'Clean air from outside, especially in nature.', ex: 'I love opening the window to let the fresh air in.', speak: 'Do you get enough fresh air where you live?' },
            'commute': { def: 'The regular journey you make between your home and your job/school.', ex: 'My daily commute takes 45 minutes by train.', speak: 'How long is your daily commute?' },
            'rush hour': { def: 'The busy part of the day when people are traveling to or from work.', ex: 'Avoid driving at 5 PM, it is rush hour.', speak: 'What is the best way to travel during rush hour?' },
            'delay': { def: 'When something happens later than expected.', ex: 'There was a 30-minute delay on the subway.', speak: 'How do you feel when your transport is delayed?' }
        };

        // --- 2. LESSON CONTENT (32 STEPS) ---
        const stepsData = [
            // 0: PROTOCOL
            `<div class="glass-panel" style="max-width: 800px; margin: 0 auto;">
                <h2><i class="fa-solid fa-chalkboard-user"></i> Teacher Guide (A2/B1 Edition)</h2>
                <div style="border-left: 4px solid var(--accent); padding-left: 25px; margin: 30px 0; background: rgba(255,255,255,0.02); padding-top: 15px; padding-bottom: 15px; border-radius: 0 12px 12px 0;">
                    <p><strong>Topic:</strong> City Life vs. Country Life (Urban Escape).</p>
                    <p><strong>Target:</strong> Comparatives, Superlatives & Irregular Adjectives.</p>
                    <p><strong>Focus:</strong> Reading comprehension, Dialogue Analysis, and Real-life Dilemmas.</p>
                </div>
                <button class="btn btn-accent" onclick="this.style.display='none'; unlockPrompt('p0')"><i class="fa-solid fa-power-off"></i> Initialize System</button>
                <div class="speaking-hub" id="p0">
                    <p>Teacher, ask the student: "Where do you live right now? In a busy city or a quiet town?"</p>
                </div>
            </div>`,
            
            // 1: HERO
            `<div class="glass-panel" style="width: 100%; background: transparent; border: none; box-shadow: none; padding: 0;">
                <div class="dual-panel">
                    <div>
                        <p style="color: var(--accent); font-weight: 800; letter-spacing: 4px; font-size: 1rem;"><i class="fa-solid fa-tree-city"></i> LIFESTYLE DEBATE</p>
                        <h1 style="font-size: 5.5rem; margin-top: 10px;">Urban<br>Escape</h1>
                        <p style="font-size: 1.4rem;">City Life or Country Life? Where do you belong?</p>
                        <button class="btn btn-accent" style="margin-top: 20px; font-size: 1.2rem; padding: 20px 40px;" onclick="this.style.display='none'; unlockPrompt('p1')"><i class="fa-solid fa-play"></i> Start Mission</button>
                    </div>
                    <div>
                        <div style="background: rgba(255,255,255,0.03); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; backdrop-filter: blur(10px);">
                            <p style="margin: 0; font-size: 0.9rem; color: var(--accent); letter-spacing: 2px; font-weight: 800;"><i class="fa-solid fa-bullseye"></i> GRAMMAR TARGET</p>
                            <h3 style="margin-top: 10px; font-size: 2rem; color: #fff;">Comparatives & Superlatives</h3>
                        </div>
                        <div class="speaking-hub" id="p1" style="margin-top: 0;">
                            <p>Look at the title. What is an "Escape"? Why do people want to escape the city?</p>
                        </div>
                    </div>
                </div>
            </div>`,

            // 2: DISCOVERY (VIBE CHECK)
            `<div class="glass-panel" style="text-align: center;">
                <h2><i class="fa-solid fa-map-location-dot"></i> The Vibe Check</h2>
                <p>Click the icons to explore vocabulary for describing places.</p>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; text-align: left;">
                    <div class="list-item" onclick="openVocab('crowded', 'p2')"><i class="fa-solid fa-users"></i> Crowded</div>
                    <div class="list-item" onclick="openVocab('peaceful', 'p2')"><i class="fa-solid fa-leaf"></i> Peaceful</div>
                    <div class="list-item" onclick="openVocab('polluted', 'p2')"><i class="fa-solid fa-smog"></i> Polluted</div>
                    <div class="list-item" onclick="openVocab('expensive', 'p2')"><i class="fa-solid fa-sack-dollar"></i> Expensive</div>
                </div>
                <div class="speaking-hub" id="p2" style="text-align: left; margin-top: 40px;">
                    <p>Which of these 4 words describes your city right now?</p>
                </div>
            </div>`,

            // 3: READING: The Big Move
            `<div class="glass-panel">
                <h2><i class="fa-solid fa-envelope"></i> Reading Analysis: The Big Move</h2>
                <p>Sarah just moved from London to a small village. Read her email to her friend.</p>

            const startersHtml = starters.map(s => `<button class="speaking-starter" onclick="console.log('${s}')">${s}</button>`).join('');
            
            document.getElementById('asideContent').innerHTML = `
                <p class="vocab-eyebrow"><i class="fa-solid fa-magnifying-glass"></i> Analysis</p>
                <h2 class="vocab-title" style="font-size:2.5rem;">${title}</h2>
                <div style="background: rgba(0,0,0,0.3); padding: 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);">
                    <p style="font-size: 1.2rem; color: #fff; font-weight: 400; line-height: 1.6;">${text}</p>
                </div>
                <div style="margin-top: auto; background: var(--accent); border-radius: 16px; padding: 30px; position: relative;">
                    <span style="position: absolute; top: -12px; left: 20px; background: #121212; color: var(--accent); font-size: 0.75rem; font-weight: 900; padding: 6px 14px; border-radius: 500px; letter-spacing: 2px;">DISCUSS</span>
                    <p style="color: #000 !important; font-weight: 800; margin: 0; font-size: 1.2rem; line-height: 1.4; margin-bottom:15px;">${question}</p>
                    <div class="speaking-starters-container">${startersHtml}</div>
                </div>
            `;
            document.getElementById('vocabPanel').classList.add('open');
        }

        function closeVocab() { document.getElementById('vocabPanel').classList.remove('open'); }
        function toggleWhiteboard() { document.getElementById('whiteboardPanel').classList.toggle('open'); }
        function toggleFullscreen() { if (!document.fullscreenElement) { const req = document.documentElement.requestFullscreen(); if (req && req.catch) { req.catch(e => console.warn("Fullscreen not allowed:", e)); } } else { if (document.exitFullscreen) { document.exitFullscreen(); } } }

        window.onload = initializeSteps;
    </script>
</body>
</html>
